<mat-toolbar color="primary" class="admin-toolbar">
  <span>Calendar Booking — Admin</span>
  <span class="toolbar-spacer"></span>
  <nav>
    <a mat-button routerLink="/admin" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}">Dashboard</a>
    <a mat-button routerLink="/admin/event-types" routerLinkActive="active-link">Event Types</a>
    <a mat-button routerLink="/admin/bookings" routerLinkActive="active-link">Bookings</a>
  </nav>
</mat-toolbar>

<div class="page">
  <div class="welcome">
    <h1>Admin Dashboard</h1>
    <p class="subtitle">Manage your calendar bookings</p>
  </div>

  <div class="nav-cards">
    <a mat-card class="nav-card" routerLink="/admin/event-types">
      <mat-icon class="card-icon" aria-hidden="false" aria-label="Event types">event</mat-icon>
      <h2>Manage Event Types</h2>
      <p>Create, edit, and delete event types</p>
    </a>

    <a mat-card class="nav-card" routerLink="/admin/bookings">
      <mat-icon class="card-icon" aria-hidden="false" aria-label="Bookings">book_online</mat-icon>
      <h2>View Bookings</h2>
      <p>See all upcoming bookings</p>
    </a>
  </div>
</div>
